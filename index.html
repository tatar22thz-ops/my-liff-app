<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Trigo Assistant</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&display=swap');

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  min-height: 100%;
  background: #EEF2F7;
  font-family: "Kanit", "Segoe UI", sans-serif;
}

body {
  display: flex;
  justify-content: center;
  width: 100%;
  overflow-x: hidden;
}

.app {
    position: relative;
    width: 100%;
    max-width: none;
    min-height: 100vh;
    overflow: hidden;
    background: #EEF2F7;
    color: #000000;
}

.top-header {
  position: relative;
  height: 6.52vh;
  background: #0E4F8C;
  border-bottom: 1px solid rgba(255,255,255,.38);
  display: flex;
  align-items: center;
}

.home-header {
  position: relative;
  height: 15vh;
  background-image: url('home-banner.jpg');
  background-size: 100% auto;
  background-position: top center;
  background-repeat: no-repeat;
  background-color: #000513;
}

.home-logo {
  position: absolute;
  left: 13px;
  top: 0.83vh;
  width: 7.94vh;
  height: 4.27vh;
}

.home-subtitle {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 1.5vh;
  text-align: center;
}

.home-subtitle .underline {
  width: 60px;
  height: 3px;
  margin: 0 auto 0.7vh;
  background: #8CC63F;
}

.home-subtitle span {
  color: #ffffff;
  font-family: "Kanit", "Segoe UI", sans-serif;
  font-size: 1.66vh;
  font-weight: 700;
  letter-spacing: .2px;
}

.logo {
  width: 7.94vh;
  height: 4.27vh;
  display: block;
}

.top-header .logo {
  margin-left: 13px;
  flex: 0 0 auto;
}

.top-header h1 {
  margin: 0 0 0 15px;
  color: #ffffff;
  font-size: 3.55vh;
  line-height: 1;
  font-weight: 700;
  letter-spacing: .1px;
  white-space: nowrap;
}

.user-bar {
  height: 4.74vh;
  background: #0E4F8C;
  display: flex;
  align-items: center;
  padding-left: 102px;
  gap: 15px;
}

.user-icon {
  width: 3.44vh;
  height: 3.44vh;
  flex: 0 0 auto;
}

.user-icon svg {
  display: block;
  width: 100%;
  height: 100%;
}

.user-name {
  color: #ffffff;
  font-size: 2.73vh;
  line-height: 1;
  font-weight: 400;
  letter-spacing: .1px;
  padding-bottom: 1px;
}

.menu {
  padding: 1.9vh 16px 0;
}

.menu-card {
  width: 100%;
  height: 8.53vh;
  margin: 0 0 1.9vh;
  border: 0;
  border-radius: 16px;
  background: #ffffff;
  box-shadow: 0 4px 12px rgba(0,0,0,.08);
  display: flex;
  align-items: center;
  text-align: left;
  padding: 0;
  font: inherit;
  color: inherit;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.menu-card-large {
  height: 9.48vh;
}

.card-icon {
  width: 8.53vh;
  height: 8.53vh;
  margin-left: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex: 0 0 auto;
}

.card-icon svg {
  display: block;
  width: 5.92vh;
  height: 5.92vh;
}

.icon-green {
  color: #08A33A;
}

.icon-blue {
  color: #1687F4;
}

.icon-red {
  color: #FF0909;
}

.icon-orange {
  color: #F39800;
}

.card-copy {
  display: flex;
  flex-direction: column;
  justify-content: center;
  margin-left: 17px;
  padding-bottom: 5px;
  min-width: 0;
}

.card-copy-second {
  margin-left: 17px;
  padding-bottom: 0;
}

.card-copy-small {
  margin-left: 17px;
  padding-bottom: 1px;
}

.card-title {
  display: block;
  color: #000000;
  font-size: 3.55vh;
  line-height: 1.05;
  font-weight: 800;
  letter-spacing: 0;
  white-space: nowrap;
}

.card-subtitle {

  margin-top: 0.71vh;
  color: #333333;
  font-size: 1.54vh;

  letter-spacing: 0;

}

.menu-card-large .card-subtitle {

}

footer {

  right: 0;

.receive-header {

.back-btn {

.header-logo {

}

}

.scan-view {

.manual-link-btn {

.scan-video {

.scan-corner {

}

.scan-corner.bl {
  bottom: 0;

  border-top: 0;

}

.scan-corner.br {
  bottom: 0;
  right: 0;

.scan-title {

.scan-subtitle {

.scan-button {

.scan-button svg {

}

.result-view {

  padding-top: 2.73vh;
}

.scan-ok-title {

  justify-content: center;

}

.info-card {

  background: #ffffff;

.info-row {

.batch-panel {

}

.batch-panel.new {

.batch-title {

  justify-content: center;
  gap: 20px;
  color: #FFB000;
  font-size: 2.49vh;
  line-height: 1;

}

.batch-title svg {

.batch-lines {

.new-ribbon {

  top: 1.66vh;
  width: 5.33vh;
  height: 5.33vh;

  align-items: center;
  justify-content: center;
}

.new-ribbon span {

}

.new-title {

  text-align: center;
  font-size: 2.73vh;
  line-height: 1;

}

.new-message {

  text-align: center;
  font-size: 2.49vh;

}

.qty-form {
  width: 340px;
  margin: 3.44vh auto 0;
}

.qty-row {
  display: grid;
  grid-template-columns: 94px 246px;
  align-items: center;
  margin-bottom: 2.25vh;
}

.qty-row label {
  color: #333333;
  font-size: 3.67vh;
  line-height: 1;
  font-weight: 400;
}

.qty-row input {

  height: 4.27vh;
  border: 2px solid #AEB4B8;
  border-radius: 8px;
  background: #ffffff;
  padding: 0 12px;
  color: #000000;
  font-family: "Kanit", "Segoe UI", sans-serif;
  font-size: 2.49vh;
  line-height: 1;
  outline: none;
}

.qty-row input::placeholder {
  color: #AEB4B8;
}

.qty-row select {
  width: 246px;
  height: 4.27vh;
  border: 2px solid #AEB4B8;
  border-radius: 8px;
  background: #ffffff;
  padding: 0 12px;
  color: #000000;
  font-family: "Kanit", "Segoe UI", sans-serif;
  font-size: 2.49vh;
  line-height: 1;
  outline: none;
}

.form-valid {
  width: 340px;
  height: 4.74vh;
  margin: 6.04vh auto 2.61vh;
  border-radius: 7px;
  background: #DEF3D7;
  color: #00A000;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 26px;

  line-height: 1;
  font-weight: 800;
}

.form-valid svg {
  width: 3.08vh;
  height: 3.08vh;
  flex: 0 0 auto;
}

.action-row {
  width: 344px;
  margin: 0 auto;
  display: flex;
  justify-content: space-between;
}

.action-btn {
  height: 7.23vh;
  border-radius: 7px;
  padding: 0;

  font-weight: 800;

}

.rescan-btn {

  border: 2px solid #AEB4B8;
  background: #ffffff;
  color: #000000;
}

.confirm-btn {

  border: 0;

}

.confirm-btn.ready {

}

.action-btn svg {
  width: 4.03vh;
  height: 4.03vh;

}

.error-view {

  min-height: 93.48vh;
  padding-top: 12.80vh;
}

.error-card {
  width: 322px;
  height: 35.66vh;
  margin: 0 auto;
  border-radius: 16px;
  background: #FFDCDC;
  text-align: center;
  padding-top: 2.13vh;
}

.error-card .big-x {
  width: 7.94vh;
  height: 7.94vh;
  margin-bottom: 6.75vh;
}

.error-title {
  color: #FF1111;
  font-size: 2.84vh;
  line-height: 1;
  font-weight: 800;

}

.error-title svg {

  height: 3.67vh;

}

.error-text {

  font-size: 2.73vh;
  line-height: 1.4;
  font-weight: 800;

}

.error-scan-btn {

  left: 50%;
  top: 68.96vh;
  width: 319px;
  height: 8.41vh;

.error-scan-btn svg,

.confirm-card {

.save-btn {

.edit-btn {

.edit-btn svg {

.success-icon svg {

<body>
  <main id="app" class="app">
    <header class="home-header">
      <img class="home-logo" src="logo.svg" alt="TRIGO">
      <div class="home-subtitle">
        <div class="underline"></div>
        <span>Inventory &bull; Sorting &bull; Operations</span>
      </div>
    </header>

    <section class="user-bar">
      <div class="user-icon" aria-hidden="true">
        <svg viewBox="0 0 64 64">
          <circle cx="32" cy="32" r="31" fill="none" stroke="#ffffff" stroke-width="3"></circle>
          <circle cx="32" cy="24" r="13" fill="#ffffff"></circle>
          <path d="M10 58C14 45 22 39 32 39C42 39 50 45 54 58C48 62 40 64 32 64C24 64 16 62 10 58Z" fill="#ffffff"></path>
        </svg>
      </div>
      <div id="homeUserName" class="user-name">Loading...</div>
    </section>

    <section class="menu">
      <button class="menu-card menu-card-large" type="button" onclick="openReceive()">
        <span class="card-icon icon-green">
          <svg viewBox="0 0 96 96" aria-hidden="true">
            <path d="M30 10H66V44H85L48 80L11 44H30V10Z" fill="currentColor"></path>
            <rect x="10" y="82" width="76" height="14" rx="7" fill="currentColor"></rect>
          </svg>
        </span>
        <span class="card-copy">
          <span class="card-title">รับงานเข้า</span>
          <span class="card-subtitle">Scan QR บันทึกยอดงาน</span>
        </span>
      </button>

      <button class="menu-card menu-card-large" type="button">
        <span class="card-icon icon-blue">
          <svg viewBox="0 0 96 96" aria-hidden="true">
            <path d="M31 86H65V46H85L48 10L11 46H31V86Z" fill="currentColor"></path>
            <path d="M8 70H14V82H82V70H88V90H8V70Z" fill="currentColor"></path>
          </svg>
        </span>
        <span class="card-copy card-copy-second">
          <span class="card-title">เบิกงานออก</span>
          <span class="card-subtitle">บันทึกข้อมูลการเบิกงาน</span>
        </span>
      </button>

      <button class="menu-card" type="button">

      <img class="logo" src="logo.svg" alt="TRIGO">
    </div>
  </header>

  <div id="receiveContent"></div>
</section>
</template>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="https://unpkg.com/@zxing/library@0.20.0/umd/index.min.js"></script>

<script>
var GAS_API = "https://script.google.com/macros/s/AKfycbxeASt8OLOAIj9GIuJUGUGS6iBeELosvSfsrm0oSGN7GfOeEyb8NVD2_2z7XMralNZdlA/exec";

var receiveState = {
  scanResult: null,
  form: {
    total: "",
    ok: "",
    ng: ""
  }
};

var homeHtmlCache = "";
var currentLineUserId = "";
var currentLineDisplayName = "";
var currentEmployeeDisplayName = "";
var liffReady_ = false;
var partOptionsCache_ = null;

function withTimeout_(promise, ms) {
  return Promise.race([
    promise,
    new Promise(function (resolve, reject) {
      setTimeout(function () { reject(new Error("timeout")); }, ms);
    })
  ]);
}

async function api(action, extra) {
  var body = Object.assign({ action: action }, extra || {});

  var res = await fetch(GAS_API, {
    method: "POST",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify(body)
  });

  return res.json();
}

document.addEventListener("DOMContentLoaded", async function () {

  try {
    await withTimeout_(liff.init({
        liffId: "2010604851-K7e6kZ3m"
    }), 15000);
    liffReady_ = true;
  } catch (e) {
    alert(
      "liff.init() ล้มเหลว:\n" +
      "message: " + (e && e.message) + "\n" +
      "code: " + (e && e.code) + "\n" +
      "raw: " + JSON.stringify(e)
    );
    return;
  }

  if (!liff.isLoggedIn() && !liff.isInClient()) {
    liff.login();
    return;
  }

  try {
    var profile = await withTimeout_(liff.getProfile(), 15000);
    currentLineUserId = profile.userId;
    currentLineDisplayName = profile.displayName;
  } catch (e) {
    console.log(e);
    alert("liff.getProfile() ล้มเหลว: " + (e && e.message ? e.message : e));
  }

  var app = document.getElementById("app");

  if (app) {
    homeHtmlCache = app.innerHTML;
  }

  loadInitialData();

});


function loadInitialData() {
  api("getInitialData", { lineUserId: currentLineUserId, lineDisplayName: currentLineDisplayName })
    .then(function(data) {
      var userName = document.getElementById("homeUserName");

      if (userName && data && data.employee) {
        userName.textContent = data.employee.displayName || data.employee.name || "Unknown";
        currentEmployeeDisplayName = data.employee.displayName || data.employee.name || "Unknown";
      }

      if (data && data.employee && !data.employee.employeeId) {
        showUnauthorizedView();
      }
    })
    .catch(function(err) {
      console.log(err);
      var userName = document.getElementById("homeUserName");

      if (userName) {
        userName.textContent = "Unknown";
      }
    });
}

function showUnauthorizedView() {
  var app = document.getElementById("app");

  if (!app) return;

  app.innerHTML = `
    <header class="top-header">
      <img class="logo" src="logo.svg" alt="TRIGO">
      <h1>Trigo Assistant</h1>
    </header>

    <div class="error-view">
      <section class="error-card">
        ${bigXIcon()}
        <h2 class="error-title">
          ${smallXIcon()}
          <span>ไม่ได้รับอนุญาต</span>
        </h2>
        <p class="error-text">บัญชี LINE นี้ยังไม่ได้ลงทะเบียน<br>เป็นพนักงานในระบบ<br>กรุณาติดต่อหัวหน้างาน</p>
      </section>
    </div>
  `;
}

function openReceive() {
  var template = document.getElementById("receive-template");
  document.getElementById("app").innerHTML = template.innerHTML;
  showScanView();
}

function goHome() {
  stopScanCamera_();
  var app = document.getElementById("app");

  if (app && homeHtmlCache) {
    app.innerHTML = homeHtmlCache;
    loadInitialData();
    return;
  }

  window.location.href = window.location.href.split("?")[0];
}

function showScanView() {
  stopScanCamera_();
  receiveState.scanResult = null;
  receiveState.isManual = false;
  receiveState.form = {
    total: "",
    ok: "",
    ng: ""
  };

  document.getElementById("receiveContent").innerHTML = `
    <div class="scan-view">
      <div class="scan-frame">
        <span class="scan-corner tl"></span>
        <span class="scan-corner tr"></span>
        <span class="scan-corner bl"></span>
        <span class="scan-corner br"></span>
      </div>

      <h2 class="scan-title">สแกน QR Code</h2>
      <p class="scan-subtitle">สแกน QR Code ที่กล่องงาน<br>หรือ Tag ข้างPallet</p>

      <button class="scan-button" type="button" onclick="startScan()">
        ${cameraIcon()}
        <span>เริ่มสแกน</span>
      </button>

      <button class="manual-link-btn" type="button" onclick="showManualEntryView()">
        กรอกข้อมูลด้วยตัวเอง
      </button>
    </div>
  `;
}

var codeReader_ = null;
var scanCancelledByUser_ = false;

async function startScan() {

  if (!liffReady_) {
    alert("liff.init() ยังไม่สำเร็จ ไม่สามารถสแกนได้");
    return;
  }

  if (codeReader_) {
    scanCancelledByUser_ = true;
    stopScanCamera_();
    showScanView();
    return;
  }

  var frame = document.querySelector(".scan-frame");
  var btnLabel = document.querySelector(".scan-button span");

  if (!frame) return;

  var video = document.createElement("video");
  video.id = "scanVideo";
  video.className = "scan-video";
  video.setAttribute("muted", "");
  video.setAttribute("playsinline", "");
  frame.insertBefore(video, frame.firstChild);

  if (btnLabel) btnLabel.textContent = "แตะเพื่อหยุดสแกน";

  scanCancelledByUser_ = false;

  try {

    var hints = new Map();
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
      ZXing.BarcodeFormat.QR_CODE,
      ZXing.BarcodeFormat.DATA_MATRIX
    ]);

    codeReader_ = new ZXing.BrowserMultiFormatReader(hints);

    var result = await codeReader_.decodeOnceFromConstraints(
      { video: { facingMode: "environment" } },
      "scanVideo"
    );

    stopScanCamera_();
    handleScanResult_(result.getText());

  } catch (e) {

    var wasCancelled = scanCancelledByUser_;
    stopScanCamera_();

    if (!wasCancelled) {
      console.log(e);
      alert("สแกนไม่สำเร็จ: " + (e && e.message ? e.message : e));
      showScanView();
    }

  }

}

function stopScanCamera_() {
  if (codeReader_) {
    try { codeReader_.reset(); } catch (e) {}
    codeReader_ = null;
  }
}

function handleScanResult_(rawValue) {
  api("scanReceive", { rawScan: rawValue, lineUserId: currentLineUserId })
    .then(function(data){

        if(!data || !data.ok){
            if (data && data.error) {
              alert(data.error);
              return;
            }
            showNotFoundView();
            return;
        }

        receiveState.scanResult = data;
        showResultView(data);

    })
    .catch(function(err){

        alert(err);

    });
}

async function showManualEntryView() {
  if (!partOptionsCache_) {
    try {
      var res = await api("getPartOptions", {});
      partOptionsCache_ = (res && res.ok && res.options) ? res.options : [];
    } catch (e) {
      console.log(e);
      alert("โหลดข้อมูล Part ไม่สำเร็จ");
      partOptionsCache_ = [];
    }
  }

  var missions = [];
  var seenMission = {};

  partOptionsCache_.forEach(function(opt) {
    var m = opt.mission || "";
    if (!m || seenMission[m]) return;
    seenMission[m] = true;
    missions.push(m);
  });

  var missionOptionsHtml = '<option value="">เลือก Mission</option>' +
    missions.map(function(m) {
      return '<option value="' + escapeHtml(m) + '">' + escapeHtml(m) + '</option>';
    }).join("");

  document.getElementById("receiveContent").innerHTML = `
    <div class="result-view">
      <h2 class="scan-ok-title">
        <span>กรอกข้อมูลด้วยตัวเอง</span>
      </h2>

      <section class="qty-form">
        <div class="qty-row">
          <label>Mission</label>
          <select id="manualMission" onchange="onManualMissionChange()">
            ${missionOptionsHtml}
          </select>
        </div>
        <div class="qty-row">
          <label>Part No</label>
          <select id="manualPartNumber" onchange="updateManualForm()" disabled>
            <option value="">เลือก Mission ก่อน</option>
          </select>
        </div>
        <div class="qty-row">
          <label>Batch</label>
          <input id="manualBatch" type="text" placeholder="กรอก Batch" oninput="updateManualForm()">
        </div>
        <div class="qty-row">
          <label>Total</label>
          <input id="manualTotal" type="number" inputmode="numeric" placeholder="ใส่จำนวนตัวเลข" oninput="updateManualForm()">
        </div>
        <div class="qty-row">
          <label>OK</label>
          <input id="manualOk" type="number" inputmode="numeric" placeholder="ใส่จำนวนตัวเลข" oninput="updateManualForm()">
        </div>
        <div class="qty-row">
          <label>NG</label>
          <input id="manualNg" type="number" inputmode="numeric" placeholder="ใส่จำนวนตัวเลข" oninput="updateManualForm()">
        </div>
      </section>

      <div class="form-valid">
        ${checkCircleIcon()}
        <span>OK + NG = Total</span>
      </div>

      <div class="action-row">
        <button class="action-btn rescan-btn" type="button" onclick="showScanView()">
          <span>ยกเลิก</span>
        </button>
        <button id="manualNextBtn" class="action-btn confirm-btn" type="button" onclick="submitManualEntry()" disabled>
          ${downloadIcon()}
          <span>ถัดไป</span>
        </button>
      </div>
    </div>
  `;
}

function onManualMissionChange() {
  var mission = document.getElementById("manualMission").value;
  var partSelect = document.getElementById("manualPartNumber");

  if (!mission) {
    partSelect.innerHTML = '<option value="">เลือก Mission ก่อน</option>';
    partSelect.disabled = true;
    updateManualForm();
    return;
  }

  var parts = partOptionsCache_.filter(function(opt) {
    return (opt.mission || "") === mission;
  });

  partSelect.innerHTML = '<option value="">เลือก Part No</option>' +
    parts.map(function(p) {
      var label = (p.partNumber || "") + " - " + (p.partName || "");
      return '<option value="' + escapeHtml(p.partNumber) + '">' + escapeHtml(label) + '</option>';
    }).join("");
  partSelect.disabled = false;

  updateManualForm();
}

function updateManualForm() {
  var mission = document.getElementById("manualMission").value;
  var partNumber = document.getElementById("manualPartNumber").value;
  var batch = document.getElementById("manualBatch").value.trim();
  var total = Number(document.getElementById("manualTotal").value || 0);
  var ok = Number(document.getElementById("manualOk").value || 0);
  var ng = Number(document.getElementById("manualNg").value || 0);
  var nextBtn = document.getElementById("manualNextBtn");

  var valid = mission && partNumber && batch && total > 0 && ok >= 0 && ng >= 0 && ok + ng === total;

  if (valid) {
    nextBtn.disabled = false;
    nextBtn.classList.add("ready");
  } else {
    nextBtn.disabled = true;
    nextBtn.classList.remove("ready");
  }
}

function submitManualEntry() {
  var mission = document.getElementById("manualMission").value;
  var partNumber = document.getElementById("manualPartNumber").value;
  var batch = document.getElementById("manualBatch").value.trim();
  var total = Number(document.getElementById("manualTotal").value || 0);
  var ok = Number(document.getElementById("manualOk").value || 0);
  var ng = Number(document.getElementById("manualNg").value || 0);

  var part = partOptionsCache_.find(function(opt) {
    return (opt.mission || "") === mission && (opt.partNumber || "") === partNumber;
  });

  if (!part) {
    alert("ไม่พบข้อมูล Part นี้");
    return;
  }

  receiveState.isManual = true;
  receiveState.scanResult = {
    employee: { displayName: currentEmployeeDisplayName || "Unknown" },
    part: { mission: part.mission, partName: part.partName, partNumber: part.partNumber },
    parsed: { batch: batch },
    rawScan: "MANUAL_ENTRY"
  };
  receiveState.form = { total: total, ok: ok, ng: ng };

  showConfirmView();
}

function showResultView(result) {
  var batchHtml = "";

  if (result.state === "BATCH_EXISTS") {
    batchHtml = `
      <section class="batch-panel">
        <h3 class="batch-title">
          ${warningIcon()}
          <span>Batch นี้เคยบันทึกแล้ว</span>
        </h3>
        <div class="batch-lines">
          <div>ครั้งที่&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;: ${result.batchInfo.count}</div>
          <div>OK สะสม&nbsp;: ${result.batchInfo.ok}</div>
          <div>NG สะสม : ${result.batchInfo.ng}</div>
        </div>
      </section>
    `;
  } else {
    batchHtml = `
      <section class="batch-panel new">
        <div class="new-ribbon"><span>NEW</span></div>
        <h3 class="new-title">Batch ใหม่</h3>
        <p class="new-message">ยังไม่เคยบันทึกข้อมูลของ Batch นี้</p>
      </section>
    `;
  }

  document.getElementById("receiveContent").innerHTML = `
    <div class="result-view">
      <h2 class="scan-ok-title">
        ${checkCircleIcon()}
        <span>สแกนสำเร็จ</span>
      </h2>

      ${partInfoCard(result.part, result.parsed.batch)}

      ${batchHtml}

      <section class="qty-form">
        <div class="qty-row">
          <label>Total</label>
          <input id="totalInput" type="number" inputmode="numeric" placeholder="ใส่จำนวนตัวเลข" oninput="updateQtyForm()">
        </div>
        <div class="qty-row">
          <label>OK</label>
          <input id="okInput" type="number" inputmode="numeric" placeholder="ใส่จำนวนตัวเลข" oninput="updateQtyForm()">
        </div>
        <div class="qty-row">
          <label>NG</label>
          <input id="ngInput" type="number" inputmode="numeric" placeholder="ใส่จำนวนตัวเลข" oninput="updateQtyForm()">
        </div>
      </section>

      <div class="form-valid">
        ${checkCircleIcon()}
        <span>OK + NG = Total</span>
      </div>

      <div class="action-row">
        <button class="action-btn rescan-btn" type="button" onclick="showScanView()">
          ${refreshIcon()}
          <span>สแกนใหม่</span>
        </button>
        <button id="confirmBtn" class="action-btn confirm-btn" type="button" onclick="showConfirmView()" disabled>
          ${downloadIcon()}
          <span>ยืนยัน</span>
        </button>
      </div>
    </div>
  `;
}

function updateQtyForm() {
  var total = Number(document.getElementById("totalInput").value || 0);
  var ok = Number(document.getElementById("okInput").value || 0);
  var ng = Number(document.getElementById("ngInput").value || 0);
  var confirmBtn = document.getElementById("confirmBtn");

  receiveState.form = {
    total: total,
    ok: ok,
    ng: ng
  };

  if (total > 0 && ok >= 0 && ng >= 0 && ok + ng === total) {
    confirmBtn.disabled = false;
    confirmBtn.classList.add("ready");
  } else {
    confirmBtn.disabled = true;
    confirmBtn.classList.remove("ready");
  }
}

function showNotFoundView() {
  document.getElementById("receiveContent").innerHTML = `
    <div class="error-view">
      <section class="error-card">
        ${bigXIcon()}
        <h2 class="error-title">
          ${smallXIcon()}
          <span>ไม่พบข้อมูล</span>
        </h2>
        <p class="error-text">ไม่พบข้อมูล Part นี้<br>กรุณาตรวจสอบ QR Code<br>หรือติดต่อหัวหน้างาน</p>
      </section>

      <button class="error-scan-btn" type="button" onclick="showScanView()">
        ${refreshWhiteIcon()}
        <span>Scan ใหม่</span>
      </button>

      <button class="error-home-btn" type="button" onclick="goHome()">
        ${homeBlackIcon()}
        <span>กลับหน้าแรก</span>
      </button>
    </div>
  `;
}

function showConfirmView() {
  var result = receiveState.scanResult;
  var form = receiveState.form;

  document.getElementById("receiveContent").innerHTML = `
    <div class="confirm-view">
      <h2 class="confirm-heading">ตรวจสอบข้อมูลก่อนกดยืนยัน</h2>

      <section class="confirm-card">
        <div class="info-row">
          <span>วันที่</span>

        </div>
        <div class="info-row">

        </div>
        <div class="info-row">
          <span>Mission</span>
          <span class="info-value">${escapeHtml(result.part.mission)}</span>
        </div>
        <div class="info-row">
          <span>Part Name</span>
          <span class="info-value">${escapeHtml(result.part.partName)}</span>
        </div>
        <div class="info-row">
          <span>Part No.</span>
          <span class="info-value">${escapeHtml(result.part.partNumber)}</span>
        </div>
        <div class="info-row">
          <span>Batch</span>
          <span class="info-value">${escapeHtml(result.parsed.batch)}</span>
        </div>
      </section>

      <section class="confirm-qty">
        <div class="confirm-qty-row">
          <span>Total</span>
          <span>${form.total}</span>
        </div>
        <div class="confirm-qty-row">
          <span>OK</span>
          <span>${form.ok}</span>
        </div>
        <div class="confirm-qty-row">
          <span>NG</span>
          <span>${form.ng}</span>
        </div>
      </section>

      <button class="save-btn" type="button" onclick="saveReceiveData()">
        ${checkCircleWhiteIcon()}
        <span>ยืนยัน</span>
      </button>

      <button class="edit-btn" type="button" onclick="showResultView(receiveState.scanResult)">
        ${editIcon()}
        <span>แก้ไขข้อมูล</span>
      </button>
    </div>
  `;
}

function saveReceiveData() {
  var saveBtn = document.querySelector(".save-btn");

  if (saveBtn) {
    if (saveBtn.disabled) return;
    saveBtn.disabled = true;
  }

  var result = receiveState.scanResult;
  var form = receiveState.form;

  var payload = {
    mission: result.part.mission,
    partName: result.part.partName,
    partNumber: result.part.partNumber,
    batch: result.parsed.batch,
    total: form.total,
    ok: form.ok,
    ng: form.ng,
    tagType: result.parsed ? result.parsed.tagType : "",
    scanCode: result.parsed ? result.parsed.scanCode : "",
    rawScan: result.rawScan,
    lineUserId: currentLineUserId
  };

  var action = receiveState.isManual ? "saveManualReceive" : "saveReceive";

  api(action, { payload: payload })
    .then(function(data) {
      if (data && data.ok) {
        showSuccessView();
        return;
      }

      if (saveBtn) saveBtn.disabled = false;
      alert((data && data.error) || "บันทึกไม่สำเร็จ");
    })
    .catch(function(error) {
      if (saveBtn) saveBtn.disabled = false;
      alert(error.message || error);
    });
}

function showSuccessView() {
  document.getElementById("receiveContent").innerHTML = `
    <div class="success-view">
      <div class="success-icon">${successBigIcon()}</div>
      <h2 class="success-title">บันทึกสำเร็จ</h2>
      <p class="success-text">ข้อมูลถูกบันทึก<br>เรียบร้อยแล้ว</p>

      <button class="success-home-btn" type="button" onclick="goHome()">
        ${homeWhiteIcon()}
        <span>กลับหน้าแรก</span>
      </button>
    </div>
  `;
}

function partInfoCard(part, batch) {

    <section class="info-card">
      <div class="info-row">
        <span>Mission</span>
        <span class="info-value">${escapeHtml(part.mission)}</span>
      </div>
      <div class="info-row">
        <span>Part Name</span>
        <span class="info-value">${escapeHtml(part.partName)}</span>
      </div>
      <div class="info-row">
        <span>Part No.</span>
        <span class="info-value">${escapeHtml(part.partNumber)}</span>
      </div>
      <div class="info-row">
        <span>Batch</span>
        <span class="info-value">${escapeHtml(batch)}</span>
      </div>
    </section>
  `;
}

function formatNow() {
  var d = new Date();
  var day = String(d.getDate()).padStart(2, "0");
  var month = String(d.getMonth() + 1).padStart(2, "0");
  var year = d.getFullYear();
  var hour = String(d.getHours()).padStart(2, "0");
  var minute = String(d.getMinutes()).padStart(2, "0");

  return day + "/" + month + "/" + year + " " + hour + ":" + minute;
}

function escapeHtml(value) {
  return String(value || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}
